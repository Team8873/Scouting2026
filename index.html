<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, maximum-scale=1.0">
    <title>Scouting PASS</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="icon" sizes="16x16 32x32 64x64" href="favicon.ico">
    <script src="resources/js/easy.qrcode.min.js"></script>
    <script src="resources/js/TBAInterface.js"></script>
    <script src="resources/js/googleSheets.js"></script>
    <script src="resources/js/scoutingPASS.js"></script>
    <script src="2026/rebuilt_config.js"></script>
    <link rel="stylesheet" href="resources/css/scoutingPASS.css">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(function(registration) {
                    console.log('Service Worker registered with scope:', registration.scope);
                })
                .catch(function(error) {
                    console.log('Service Worker registration failed:', error);
                });
        }
    </script>
</head>
<body>
    <form id="scoutingForm" onsubmit="return false" name="scoutingForm">
        <div id="main-panel-holder">

            <!-- ================= PREMATCH ================= -->
            <div id="prematch" class="main-panel" style="background-color: rgb(2, 29, 92);">
                <h1 id="prematchHeader1" class="page_title">
                    <span class="odd">P</span><span class="even">W</span><span class="odd">N</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020
                </h1>
                <h2 id="prematchHeader2">pre-match</h2>
                <p class="match-label">
                    <button id="nextButton1" class="button" onclick="swipePage(1)">Next</button>
                </p>
                <table id="prematch_table" style="font: Roboto">
                    <!-- ###PRE-MATCH-COMPONENTS###-->
                </table>
                <p class="match-label">
                    <button id="nextButton2" class="button" onclick="swipePage(1)">Next</button>
                </p>
            </div>

            <!-- ================= AUTON ================= -->
            <div id="auton" class="main-panel" style="background-color: rgb(2, 29, 92);">
                <h1 id="autonHeader1" class="page_title">
                    <span class="odd">P</span><span class="even">W</span><span class="odd">n</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020
                </h1>
                <h2 id="autonHeader2">Auton</h2>
                <p class="match-label">
                    <button id="prevButton1" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton3" class="button" onclick="swipePage(1)">Next</button>
                </p>
                <table id="auton_table">
                    <!-- ###AUTON-COMPONENTS###-->
                </table>
                <p class="match-label">
                    <button id="prevButton2" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton4" class="button" onclick="swipePage(1)">Next</button>
                </p>
            </div>

            <!-- ================= TELEOP ================= -->
            <div id="teleop" class="main-panel" style="background-color: rgb(2, 29, 92);">
                <h1 id="teleopHeader1" class="page_title">
                    <span class="odd">P</span><span class="even">W</span><span class="odd">n</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020
                </h1>
                <h2 id="teleopHeader2">Teleop</h2>
                <p class="match-label">
                    <button id="prevButton3" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton5" class="button" onclick="swipePage(1)">Next</button>
                </p>
                <table id="teleop_table">
                    <!-- ###TELEOP-COMPONENTS###-->
                </table>
                <p class="match-label">
                    <button id="prevButton4" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton6" class="button" onclick="swipePage(1)">Next</button>
                </p>
            </div>

            <!-- ================= ENDGAME ================= -->
            <div id="endgame" class="main-panel" style="background-color: rgb(2, 29, 92);">
                <h1 id="endgameHeader1" class="page_title">
                    <span class="odd">P</span><span class="even">W</span><span class="odd">n</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020
                </h1>
                <h2 id="endgameHeader2">Endgame</h2>
                <p class="match-label">
                    <button id="prevButton5" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton7" class="button" onclick="swipePage(1)">Next</button>
                </p>
                <table id="endgame_table">
                    <!-- ###ENDGAME-COMPONENTS###-->
                </table>
                <p class="match-label">
                    <button id="prevButton6" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton8" class="button" onclick="swipePage(1)">Next</button>
                </p>
            </div>

            <!-- ================= POST-MATCH ================= -->
            <div id="post-match" class="main-panel" style="background-color: rgb(2, 29, 92);">
                <h1 id="postmatchHeader" class="page_title">
                    <span class="odd">P</span><span class="even">W</span><span class="odd">n</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020
                </h1>
                <h2>Miscellaneous V2</h2>
                <p class="match-label">
                    <button id="prevButton7" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton9" class="button" onclick="swipePage(1)">Next</button>
                </p>
                <table id="postmatch_table">
                    <!-- ###POST-MATCH-COMPONENTS###-->
                </table>
                <p class="match-label">
                    <button id="prevButton8" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton10" class="button" onclick="swipePage(1)">Next</button>
                </p>
            </div>

            <!-- ================= QR CODE ================= -->
            <div id="qr-code" class="main-panel" style="background-color: rgb(255, 255, 255);">
                <h1 id="qrHeader1" class="page_title">
                    <span class="odd">P</span><span class="even">W</span><span class="odd">n</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020
                </h1>
                <h2 id="qrHeader2">Generate QR Code</h2>
                <p class="match-label">
                    <button id="prevButton9" class="button" onclick="swipePage(-1)">Prev</button>
                    <button id="nextButton10" class="button" onclick="swipePage(1)">Next</button>
                </p>
                <p id="qr-info">
                    <span id="display_qr-info" style="border: none; text-align: center;"></span>
                </p>
                <table id="qr-table">
                    <tr>
                        <td width="5%">&nbsp;</td>
                        <td width="90%">
                            <div id="qrcode" style="text-align:center">
                                <script>
                                    qr = new QRCode(document.getElementById("qrcode"), options)
                                </script>
                            </div>
                        </td>
                        <td width="5%">&nbsp;</td>
                    </tr>
                    <tr>
                        <td width="5%">&nbsp;</td>
                        <td width="90%">
                            <div>
                                <p id="data" style="text-align:center"></p>
                            </div>
                        </td>
                        <td width="5%">&nbsp;</td>
                    </tr>
                </table>
                <p class="match-label">
                    <button id="displayButton" class="button" onclick="displayData()">Display Data</button>
                    <button id="copyButton" class="button" onclick="copyData()">Copy Data</button>
                </p>
                <div id="submitButton">
                    <button id="submit" type="submit" class="submitForm">Send to Google Sheets</button>
                </div>
                <div id="clearButton">
                    <button type="button" class="clearForm" onclick="clearForm()">Clear Form</button>
                </div>
            </div>

        </div>
    </form>
</body>
</html>
